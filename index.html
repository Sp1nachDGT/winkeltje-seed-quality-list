<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winkeltje 種品質管理リスト</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
        }
        h1 {
            text-align: center;
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 5px;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        .info {
            text-align: center;
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .crop-group {
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #eee;
        }
        .crop-row {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            border: 1px solid #ddd;
        }
        .crop-name {
            flex: 1;
            font-weight: bold;
            font-size: 0.95rem;
        }
        select {
            padding: 6px;
            margin-right: 12px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-weight: bold;
        }
        button {
            width: 34px;
            height: 34px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            margin-left: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-btn { background-color: #4CAF50; color: white; }
        .add-btn:hover { background-color: #43a047; }
        .remove-btn { background-color: #e74c3c; color: white; }
        .remove-btn:hover { background-color: #c0392b; }

        /* プルダウン選択時の背景色設定 */
        .bg-0 { background-color: #ffffff; color: #333; }
        .bg-1 { background-color: #ff4d4d; color: white; } /* 赤 */
        .bg-2 { background-color: #ffffff; color: #333; }  /* 白 */
        .bg-3 { background-color: #2ecc71; color: white; } /* 緑 */
        .bg-4 { background-color: #3498db; color: white; } /* 青 */
        .bg-5 { background-color: #9b59b6; color: white; } /* 紫 */

        /* 数字が見やすくなるよう枠線を調整 */
        .bg-1 select, .bg-3 select, .bg-4 select, .bg-5 select {
            background: rgba(255,255,255,0.9);
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Winkeltje 種品質管理リスト</h1>
    <p class="info">自動保存機能が有効です</p>
    <div id="crop-list"></div>
</div>

<script>
    const cropNames = [
        "じゃがいも", "アーティチョーク", "アスパラガス", 
        "カモミール", "ブルーベリー", "カリフラワー", 
        "豆", "小麦", "ラベンダー"
    ];

    const STORAGE_KEY = 'winkeltje_seed_data_v2';
    const cropListContainer = document.getElementById('crop-list');

    // 全データをlocalStorageに保存
    function saveData() {
        const data = [];
        const groups = document.querySelectorAll('.crop-group');
        
        groups.forEach(group => {
            const name = group.dataset.originalName;
            const rows = group.querySelectorAll('.crop-row');
            const values = [];
            rows.forEach(row => {
                const select = row.querySelector('select');
                values.push(select.value);
            });
            data.push({ name, values });
        });
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 保存データの読み込み
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : null;
    }

    // グループ内の作物名（番号）を更新する
    function reIndexGroup(group) {
        const name = group.dataset.originalName;
        const rows = group.querySelectorAll('.crop-row');
        rows.forEach((row, index) => {
            const nameSpan = row.querySelector('.crop-name');
            if (index === 0) {
                nameSpan.textContent = name;
            } else {
                nameSpan.textContent = `${name}(${index + 1})`;
            }
        });
    }

    /**
     * 行を作成する
     * @param {string} name 作物名
     * @param {boolean} canRemove 削除ボタンを表示するか
     * @param {string} initialValue 初期選択値
     */
    function createRow(name, canRemove, initialValue = "0") {
        const row = document.createElement('div');
        row.className = `crop-row bg-${initialValue}`;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'crop-name';
        // テキストは後で reIndexGroup で設定されるためここでは空でも可

        const select = document.createElement('select');
        [0, 1, 2, 3, 4, 5].forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val === 0 ? "0" : val;
            if (val.toString() === initialValue.toString()) opt.selected = true;
            select.appendChild(opt);
        });

        // 色変更イベント
        select.addEventListener('change', (e) => {
            row.className = `crop-row bg-${e.target.value}`;
            saveData();
        });

        // ＋ボタン
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+';
        addBtn.onclick = () => {
            const parentGroup = row.parentNode;
            const newRow = createRow(name, true);
            parentGroup.appendChild(newRow);
            reIndexGroup(parentGroup);
            saveData();
        };

        row.appendChild(nameSpan);
        row.appendChild(select);
        row.appendChild(addBtn);

        // －ボタン（最初の1行目以外に付与）
        if (canRemove) {
            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '-';
            removeBtn.onclick = () => {
                const parentGroup = row.parentNode;
                row.remove();
                reIndexGroup(parentGroup);
                saveData();
            };
            row.appendChild(removeBtn);
        }

        return row;
    }

    // 初期起動処理
    function init() {
        const savedData = loadData();

        if (savedData) {
            savedData.forEach(item => {
                const group = document.createElement('div');
                group.className = 'crop-group';
                group.dataset.originalName = item.name;
                
                item.values.forEach((val, index) => {
                    const row = createRow(item.name, index !== 0, val);
                    group.appendChild(row);
                });
                cropListContainer.appendChild(group);
                reIndexGroup(group);
            });
        } else {
            cropNames.forEach(name => {
                const group = document.createElement('div');
                group.className = 'crop-group';
                group.dataset.originalName = name;
                group.appendChild(createRow(name, false));
                cropListContainer.appendChild(group);
                reIndexGroup(group);
            });
        }
    }

    init();
</script>

</body>
</html>
